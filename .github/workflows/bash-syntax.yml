name: Bash syntax

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check every installer
        run: |
          set -e
          for script in ./*.sh; do
            echo "Checking ${script}"
            bash -n "${script}"
          done
